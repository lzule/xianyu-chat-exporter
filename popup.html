<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 430px;
      max-height: 680px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #ffe14d, #ffc107);
      color: #333;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar {
      padding: 10px 16px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .toolbar input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #ffb800;
    }
    .status {
      margin-left: auto;
      color: #999;
      font-size: 12px;
    }
    .settings {
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
      background: #fffdf3;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    .label {
      min-width: 84px;
      color: #666;
      font-size: 12px;
    }
    .input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }
    .input:focus {
      border-color: #ffb800;
      box-shadow: 0 0 0 2px rgba(255, 184, 0, 0.18);
    }
    .tip {
      color: #999;
      font-size: 11px;
      line-height: 1.35;
    }
    .switch {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #666;
      font-size: 12px;
      cursor: pointer;
    }
    .switch input {
      width: 16px;
      height: 16px;
      accent-color: #ffb800;
    }
    .message-list {
      max-height: 250px;
      overflow-y: auto;
      padding: 8px 0;
    }
    .message-item {
      display: flex;
      align-items: flex-start;
      padding: 8px 16px;
      gap: 10px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    .message-item:hover { background: #fafafa; }
    .message-item input[type="checkbox"] {
      margin-top: 4px;
      width: 16px;
      height: 16px;
      accent-color: #ffb800;
      flex-shrink: 0;
    }
    .message-content { flex: 1; min-width: 0; }
    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .message-sender { font-weight: 600; color: #333; }
    .message-sender.me { color: #ff9f00; }
    .message-time { font-size: 11px; color: #999; }
    .message-text {
      color: #666;
      word-break: break-word;
      line-height: 1.45;
    }
    .message-text.image { color: #1890ff; }
    .message-text.video { color: #52c41a; }
    .quote-preview {
      color: #999;
      font-size: 11px;
      margin-bottom: 2px;
    }
    .message-product {
      margin-top: 4px;
      color: #999;
      font-size: 11px;
    }
    .report {
      border-top: 1px dashed #f0d67f;
      border-bottom: 1px solid #eee;
      background: #fffcf2;
      padding: 10px 16px;
      display: none;
    }
    .report-title {
      font-size: 12px;
      color: #8a6a00;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .report-line {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    .report-fail {
      margin-top: 6px;
      max-height: 100px;
      overflow-y: auto;
      border: 1px solid #f2e3b1;
      background: #fff;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      color: #ad4e00;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .progress {
      border-top: 1px dashed #cde6ff;
      border-bottom: 1px solid #eee;
      background: #f5faff;
      padding: 10px 16px;
      display: none;
    }
    .progress-title {
      font-size: 12px;
      color: #1565c0;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .progress-line {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .diagnostics {
      border-top: 1px dashed #d9d9d9;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      padding: 10px 16px;
      display: none;
    }
    .diagnostics-title {
      font-size: 12px;
      color: #444;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .diagnostics-line {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .footer {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #eee;
      display: grid;
      gap: 8px;
    }
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #333;
    }
    .btn-main { background: linear-gradient(135deg, #ffe14d, #ffc107); }
    .btn-sub { background: #f5f5f5; color: #555; }
    .btn:hover:not([disabled]) { filter: brightness(1.05); }
    .btn[disabled] { opacity: 0.6; cursor: not-allowed; }
    .empty, .loading {
      padding: 40px 20px;
      text-align: center;
      color: #999;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #f0f0f0;
      border-top-color: #ffb800;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span>📨</span>
    <span id="headerTitle">闲鱼聊天记录导出</span>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    正在读取闲鱼聊天记录...
  </div>

  <div id="empty" class="empty" style="display: none;">
    <div class="empty-icon">📭</div>
    <div>未找到可导出的聊天记录</div>
    <div id="emptyHint" style="font-size: 12px; margin-top: 8px;">请在闲鱼聊天页面使用本插件</div>
  </div>

  <div id="content" style="display: none;">
    <div class="toolbar">
      <label>
        <input type="checkbox" id="selectAll" checked>
        全选
      </label>
      <label style="margin-left: auto; color: #999; font-size: 12px;">
        <input type="checkbox" id="debugMode">
        调试
      </label>
      <span class="status" id="status">已选择 0 条</span>
    </div>

    <div class="settings">
      <div class="row">
        <span class="label">默认导出目录</span>
        <input id="exportSubfolder" class="input" type="text" placeholder="闲鱼导出">
      </div>
      <div class="tip">保存到“浏览器下载目录/子文件夹”，留空则用下载根目录。</div>
      <div class="row" style="margin-top: 8px;">
        <label class="switch">
          <input id="autoScrollBeforeExport" type="checkbox" checked>
          导出前自动翻取当前会话历史到顶部
        </label>
      </div>
    </div>

    <div class="message-list" id="messageList"></div>

    <div class="progress" id="runProgress">
      <div class="progress-title">运行进度</div>
      <div class="progress-line" id="progressStage">阶段：-</div>
      <div class="progress-line" id="progressSummary">进度：-</div>
      <div class="progress-line" id="progressEta">预计剩余：-</div>
    </div>

    <div class="diagnostics" id="scrollDiagnostics">
      <div class="diagnostics-title">滚动诊断</div>
      <div class="diagnostics-line" id="diagContentHit">content_hit: -</div>
      <div class="diagnostics-line" id="diagChain">scroll_chain: -</div>
      <div class="diagnostics-line" id="diagMode">active_scroll_mode: -</div>
      <div class="diagnostics-line" id="diagNode">active_scroll_node: -</div>
      <div class="diagnostics-line" id="diagReason">diagnostic_reason: -</div>
    </div>

    <div class="report" id="batchReport">
      <div class="report-title">批量导出结果</div>
      <div class="report-line" id="reportStatus">任务状态：-</div>
      <div class="report-line" id="reportSummary">总会话: - | 成功: - | 失败: - | 跳过: - | 未处理: -</div>
      <div class="report-line" id="reportFiles">文件核对: md=-, json=-</div>
      <div class="report-fail" id="reportFailures"></div>
    </div>

    <div class="footer">
      <button class="btn btn-main" id="exportBundle">导出当前会话（JSON）</button>
      <button class="btn btn-sub" id="exportAll">批量导出左侧全部会话（可核对结果）</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
